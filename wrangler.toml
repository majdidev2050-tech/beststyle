name = "beststyle-patro"
compatibility_date = "2024-04-05"
compatibility_flags = [ "nodejs_compat" ]
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "DB"
database_name = "beststyle_db"
database_id = "local-dev" # Local dev doesn't need a real ID, we'll replace when deploying
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "beststyle-uploads"
